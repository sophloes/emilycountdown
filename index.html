<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emily's Last Day</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1e0a13;
      --pink:     #f2a0bc;
      --pink-dim: #cc6b90;
      --white:    #fff0f5;
      --muted:    rgba(255, 220, 235, 0.55);
    }

    html, body { height: 100%; width: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 90% 55% at 50% 0%, #5c1a35 0%, transparent 62%),
        radial-gradient(ellipse 55% 45% at 85% 100%, #3a0f22 0%, transparent 60%);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 2rem;
      overflow: hidden;
      position: relative;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.032;
      pointer-events: none;
      z-index: 10;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    #petals { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }

    .petal {
      position: absolute;
      border-radius: 50% 0 50% 0;
      opacity: 0;
      animation: drift linear infinite;
    }

    @keyframes drift {
      0%   { transform: translateY(-60px) rotate(0deg);   opacity: 0; }
      6%   { opacity: 0.2; }
      92%  { opacity: 0.07; }
      100% { transform: translateY(110vh) rotate(480deg); opacity: 0; }
    }

    .inner {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: rise 1.1s cubic-bezier(0.22, 1, 0.36, 1) both;
      width: 100%;
      max-width: 600px;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Title — nowrap + capped size prevents overflow on wide screens */
    .title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.4rem, 5.5vw, 4.5rem);
      letter-spacing: 0.03em;
      color: var(--white);
      line-height: 1.05;
      margin-bottom: 0.4rem;
      white-space: nowrap;
    }

    .title em {
      font-style: italic;
      color: var(--pink);
    }

    .date-line {
      font-size: clamp(11px, 1.3vw, 15px);
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.8rem;
    }

    .rule {
      width: 1px;
      height: 32px;
      background: linear-gradient(to bottom, transparent, var(--pink-dim), transparent);
      margin-bottom: 1.8rem;
      opacity: 0.6;
    }

    .primary {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    /* Big number — vw-based but hard-capped so it never overflows */
    .big-num {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(5rem, 14vw, 10rem);
      line-height: 1;
      color: var(--white);
      letter-spacing: -0.02em;
      display: block;
    }

    .big-lbl {
      font-size: clamp(11px, 1.3vw, 15px);
      font-weight: 500;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--pink);
    }

    .secondary {
      display: flex;
      gap: clamp(2rem, 5vw, 5rem);
      align-items: flex-start;
      justify-content: center;
      margin-bottom: 2.8rem;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.2rem, 4.5vw, 3.8rem);
      line-height: 1;
      color: rgba(255, 220, 235, 0.75);
      letter-spacing: -0.01em;
    }

    .stat-lbl {
      font-size: clamp(10px, 1.1vw, 13px);
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--pink-dim);
    }

    .stat-sep {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.5rem, 3vw, 2.5rem);
      color: var(--pink-dim);
      opacity: 0.3;
      margin-top: 0.1em;
      user-select: none;
    }

    .progress-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .progress-label {
      font-size: clamp(10px, 1.1vw, 13px);
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .progress-pct {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.2rem, 2.2vw, 1.8rem);
      font-weight: 300;
      color: var(--pink);
      letter-spacing: 0.02em;
    }

    .progress-track {
      width: 100%;
      height: 2px;
      background: rgba(255, 220, 235, 0.12);
      border-radius: 99px;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(to right, var(--pink-dim), var(--pink));
      position: relative;
      transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .progress-dot {
      position: absolute;
      right: -4px;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--pink);
      box-shadow: 0 0 8px rgba(242, 160, 188, 0.7);
    }

    .progress-dates {
      display: flex;
      justify-content: space-between;
    }

    .progress-date {
      font-size: clamp(9px, 1vw, 12px);
      font-weight: 400;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255, 220, 235, 0.7);
    }

    .footer {
      margin-top: 2.5rem;
      font-size: clamp(9px, 1vw, 11px);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div id="petals"></div>

  <div class="inner">
    <h1 class="title"><em>Emily's</em> last day</h1>
    <p class="date-line">July 2, 2026</p>

    <div class="rule"></div>

    <div class="primary">
      <span class="big-num" id="weekdays">--</span>
      <span class="big-lbl">weekdays to go</span>
    </div>

    <div class="secondary">
      <div class="stat">
        <span class="stat-num" id="weeks">--</span>
        <span class="stat-lbl">weeks</span>
      </div>
      <span class="stat-sep" aria-hidden="true">.</span>
      <div class="stat">
        <span class="stat-num" id="months">--</span>
        <span class="stat-lbl">months</span>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-meta">
        <span class="progress-label"><span id="done-days">--</span> weekdays done</span>
        <span class="progress-pct" id="pct">--%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="fill" style="width:0%">
          <div class="progress-dot"></div>
        </div>
      </div>
      <div class="progress-dates">
        <span class="progress-date">Jan 1, 2026</span>
        <span class="progress-date">Jul 2, 2026</span>
      </div>
    </div>

    <p class="footer">counting down</p>
  </div>

  <script>
    const START  = new Date('2026-01-01');
    const TARGET = new Date('2026-07-02');

    function countWeekdays(from, to) {
      let count = 0;
      const cur = new Date(from);
      cur.setHours(0, 0, 0, 0);
      const end = new Date(to);
      end.setHours(0, 0, 0, 0);
      while (cur < end) {
        const d = cur.getDay();
        if (d !== 0 && d !== 6) count++;
        cur.setDate(cur.getDate() + 1);
      }
      return count;
    }

    const TOTAL_WEEKDAYS = countWeekdays(START, TARGET);

    function update() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const remaining = today >= TARGET ? 0 : countWeekdays(today, TARGET);
      const done      = today <= START  ? 0 : countWeekdays(START, today < TARGET ? today : TARGET);
      const pct       = Math.min(100, Math.round((done / TOTAL_WEEKDAYS) * 100));

      const calDays = Math.max(0, Math.round((TARGET - today) / 86400000));
      const weeks   = Math.floor(calDays / 7);
      const months  = Math.max(0,
        (TARGET.getFullYear() - today.getFullYear()) * 12 +
        (TARGET.getMonth() - today.getMonth())
      );

      document.getElementById('weekdays').textContent  = remaining;
      document.getElementById('weeks').textContent     = weeks;
      document.getElementById('months').textContent    = months;
      document.getElementById('done-days').textContent = done;
      document.getElementById('pct').textContent       = pct + '%';

      requestAnimationFrame(() => {
        document.getElementById('fill').style.width = pct + '%';
      });
    }

    update();
    setInterval(update, 60 * 60 * 1000);

    const colors = ['#e8799f','#b85575','#f4b8cc','#d4537e','#993556'];
    const wrap = document.getElementById('petals');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      const sz = 8 + Math.random() * 18;
      p.style.cssText = [
        `width:${sz}px`, `height:${sz}px`,
        `left:${Math.random()*100}%`,
        `top:-${sz}px`,
        `background:${colors[i % colors.length]}`,
        `animation-duration:${9+Math.random()*13}s`,
        `animation-delay:${Math.random()*18}s`,
        `transform:rotate(${Math.random()*360}deg)`,
      ].join(';');
      wrap.appendChild(p);
    }
  </script>
</body>
</html>
